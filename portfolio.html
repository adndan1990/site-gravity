<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
    body { font-family: 'Poppins', sans-serif; margin:0; padding:0; }
    header, nav, footer { text-align: center; padding: 10px; }
    nav a { margin: 0 10px; text-decoration: none; color: #333; }
    section.portfolio { padding: 20px; }

    /* Styles vidéos YouTube */
    .youtube-video iframe {
        width: 100%;
        max-width: 800px;
        height: 450px;
        margin: 20px auto;
        display: block;
        border: none;
    }

    /* Styles vidéos TikTok */
    .tiktok-video .tiktok-embed {
        max-width: 325px;
        width: 100%;
        margin: 20px auto;
        display: block;
    }

    /* Pagination boutons */
    .pagination { text-align: center; margin: 20px 0; }
    .pagination button {
        padding: 8px 15px;
        margin: 0 5px;
        cursor: pointer;
        border: 1px solid #333;
        background: #ff00ff;
        font-weight: bold;
        border-radius: 5px;
    }
    .pagination button.active { background: #333; color: #fff; }
</style>
</head>
<body>

<header>
    <h1>Portfolio</h1>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="about.html">À propos</a>
    <a href="services.html">Services</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="contact.html">Contact</a>
</nav>

<section class="portfolio">
    <!-- Page 1 : YouTube -->
    <div class="youtube-video page" id="page1">
        <h2>Mes vidéos YouTube</h2>
        <iframe src="https://www.youtube.com/embed/P4-7w7qlNGo" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/2Aq0mUKB6PU" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/es8uBpWs_cM" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/sAjP6kOA7Mg?list=PLGIXYD0-GglKwjmCdF05Zv6ZgX8YZwxzT&index=6" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/hmjC4dyNXSc" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/glbS02sccDo" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/KDmyKDBEvf4" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/ZLir6C8a0d0" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/-mgnpnxkyXQ" allowfullscreen></iframe>
        <iframe src="https://www.youtube.com/embed/bteNY9WUFHQ" allowfullscreen></iframe>
    </div>

    <!-- Page 2 : TikTok -->
    <div class="tiktok-video page" id="page2" style="display:none;">
        <h2>Mes vidéos TikTok</h2>
        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@lepaquito_rp/video/7615291213104614689" data-video-id="7615291213104614689"><section></section></blockquote>
        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@delaniia_live/video/7558859843117911318" data-video-id="7558859843117911318"><section></section></blockquote>
        <blockquote class="tiktok-embed" cite="https://www.tiktok.com/@delaniia_live/video/7476845131669425430" data-video-id="7476845131669425430"><section></section></blockquote>
    
    </div>

    <!-- Pagination boutons -->
    <div class="pagination">
        <button id="btnPage1" class="active">Page 1</button>
        <button id="btnPage2">Page 2</button>
    </div>
</section>

<footer>
    <p>© 2026</p>
</footer>

<!-- Script TikTok -->
<script async src="https://www.tiktok.com/embed.js"></script>

<!-- Script Pagination -->
<script>
    const page1 = document.getElementById('page1');
    const page2 = document.getElementById('page2');
    const btn1 = document.getElementById('btnPage1');
    const btn2 = document.getElementById('btnPage2');

    btn1.addEventListener('click', () => {
        page1.style.display = 'block';
        page2.style.display = 'none';
        btn1.classList.add('active');
        btn2.classList.remove('active');
    });

    btn2.addEventListener('click', () => {
        page1.style.display = 'none';
        page2.style.display = 'block';
        btn1.classList.remove('active');
        btn2.classList.add('active');
    });
</script>

</body>
</html>
